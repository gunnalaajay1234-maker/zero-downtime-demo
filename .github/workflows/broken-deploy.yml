name: Broken Deploy (causes downtime)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        shell: cmd
        run: docker build -t myapp:new .

      - name: Stop old container
        shell: cmd
        run: |
          docker stop myapp 
          docker rm myapp

      - name: Start new container
        shell: cmd
        run: docker run -d --name myapp --restart unless-stopped -p 3000:3000 -e APP_VERSION=v2 myapp:new
