name: Fixed Deploy (zero downtime)

on:
  push:
    branches: [fixed]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build new Docker image
        shell: cmd
        run: docker build -t myapp:new .

      - name: Start new container on port 3001
        shell: cmd
        run: |
          docker stop myapp_new & echo ok
          docker rm myapp_new & echo ok
          docker run -d --name myapp_new -p 3001:3000 -e APP_VERSION=v3 myapp:new

      - name: Wait for new container to be healthy
        shell: powershell
        run: |
          for ($i = 1; $i -le 12; $i++) {
            $status = docker inspect --format="{{.State.Health.Status}}" myapp_new 2>$null
            Write-Host "Attempt $i/12 - health: $status"
            if ($status -eq "healthy") {
              Write-Host "Healthy. Proceeding with swap."
              break
            }
            if ($i -eq 12) {
              Write-Host "Never became healthy. Rolling back."
              docker stop myapp_new
              docker rm myapp_new
              exit 1
            }
            Start-Sleep -Seconds 5
          }

      - name: Swap containers
        shell: cmd
        run: |
          docker stop myapp & echo ok
          docker rm myapp & echo ok
          docker stop myapp_new & echo ok
          docker rm myapp_new & echo ok
          docker run -d --name myapp --restart unless-stopped -p 3000:3000 -e APP_VERSION=v3 myapp:new

      - name: Verify health
        shell: cmd
        run: |
          ping -n 4 127.0.0.1 >nul
          curl -f http://localhost:3000/health