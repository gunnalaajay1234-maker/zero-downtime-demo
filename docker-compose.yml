version: '3.8'
services:
  app:
    build: .
    container_name: myapp
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - APP_VERSION=v1
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s